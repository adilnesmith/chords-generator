<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Thaat Chords & example songs</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #0c0a17;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 8px;
    }

    .app-container {
      width: 100%;
      max-width: 560px;
      height: 96vh;
      max-height: 1000px;
      background: #fefaff;
      border-radius: 2.2rem;
      padding: 1rem 0.9rem;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
      border: 1px solid #cfbef5;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      color: #1d1538;
    }

    .app-header {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-bottom: 0.7rem;
      flex-shrink: 0;
    }

    .app-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .app-title h1 {
      font-size: 1.65rem;
      font-weight: 750;
      background: linear-gradient(135deg, #3d2c6b, #7b5ed7);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.3px;
    }

    .app-badge {
      background: #5d48a3;
      color: white;
      padding: 0.2rem 1rem;
      border-radius: 60px;
      font-size: 0.65rem;
      font-weight: 600;
    }

    .selector-row {
      display: flex;
      gap: 0.7rem;
      background: #e8defd;
      border-radius: 3rem;
      padding: 0.5rem 0.8rem;
      border: 1px solid #bba7ec;
    }

    .selector-item {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .selector-item label {
      font-size: 0.6rem;
      font-weight: 800;
      text-transform: uppercase;
      color: #43377a;
      margin-left: 0.6rem;
      margin-bottom: 0.2rem;
    }

    .styled-select {
      background: white;
      border: 2px solid #aa90e0;
      border-radius: 2.2rem;
      padding: 0.65rem 0.4rem;
      font-size: 1rem;
      font-weight: 700;
      color: #1a103f;
      appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="%233a2a68" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>');
      background-repeat: no-repeat;
      background-position: right 0.7rem center;
      background-size: 1rem;
      cursor: pointer;
      text-align: center;
    }

    .scale-card {
      background: #e4d8ff;
      border-radius: 1.8rem;
      padding: 0.7rem 0.6rem;
      margin: 0.3rem 0 0.7rem 0;
      border: 2px solid #cab3f5;
      box-shadow: 0 6px 14px #cdb9f0;
      flex-shrink: 0;
    }

    .scale-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.6rem;
    }

    .scale-header span {
      background: #59478b;
      color: white;
      padding: 0.2rem 0.9rem;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .diatonic-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      justify-content: center;
    }

    .pill {
      background: white;
      border-radius: 3rem;
      padding: 0.4rem 1rem;
      font-weight: 750;
      font-size: 1.1rem;
      box-shadow: 0 2px 8px #bea8ec;
      border: 1px solid white;
      color: #241d47;
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
    }

    .pill small {
      font-size: 0.65rem;
      font-weight: 600;
      color: #6b579c;
    }

    /* scrollable borrowed area */
    .borrowed-section {
      flex: 1;
      overflow-y: auto;
      padding: 0.2rem 0.1rem 0.4rem 0;
      min-height: 0;
      background: #f5efff;
      border-radius: 1.8rem;
      border: 1px solid #dccdff;
      margin-top: 0.1rem;
    }

    .section-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #3b2c65;
      padding: 0.7rem 0.8rem 0.3rem 1rem;
      background: #ede3ff;
      border-radius: 2rem 2rem 0 0;
    }

    .modal-grid {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      padding: 0.7rem 0.7rem 0.9rem 0.7rem;
    }

    .modal-card {
      background: #ffffff;
      border-radius: 1.8rem;
      padding: 0.7rem 0.7rem;
      border: 2px solid #e0cefe;
      box-shadow: 0 5px 12px #cfbef0;
      transition: 0.1s;
    }

    .modal-header {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      margin-bottom: 0.5rem;
      flex-wrap: wrap;
      padding-left: 0.3rem;
    }

    .modal-name {
      font-weight: 800;
      font-size: 1.05rem;
      color: #2c1e57;
    }

    .modal-desc {
      background: #8f78c2;
      color: white;
      padding: 0.1rem 0.8rem;
      border-radius: 60px;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    /* scale notes row */
    .scale-notes-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin: 0.5rem 0 0.6rem 0;
      padding: 0.2rem 0.2rem;
      border-radius: 2rem;
      justify-content: center;
    }

    .scale-note-badge {
      background: #e0d2ff;
      padding: 0.2rem 0.8rem;
      border-radius: 2rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: #311f66;
      font-family: monospace;
      letter-spacing: 0.3px;
    }

    .song-example {
      background: #faf5ff;
      border-radius: 1.5rem;
      margin-top: 0.6rem;
      padding: 0.4rem 0.7rem;
      border-left: 5px solid #9b80da;
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .song-icon {
      font-size: 1rem;
    }

    .song-text {
      font-weight: 500;
      color: #2b2152;
    }

    .song-artist {
      font-size: 0.6rem;
      color: #7766aa;
      font-weight: 500;
    }

    .chord-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: flex-start;
      margin-top: 0.2rem;
    }

    .chip {
      background: white;
      border-radius: 2.2rem;
      padding: 0.35rem 1.2rem;
      font-weight: 750;
      font-size: 1rem;
      color: #201b46;
      border: 1.5px solid #cbb5ff;
      box-shadow: 0 1px 6px #bcabdf;
      transition: 0.05s linear;
    }

    .chip:active {
      background: #e5d6ff;
      transform: scale(0.96);
    }

    .app-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.5rem;
      background: #e6dcfc;
      padding: 0.45rem 1rem;
      border-radius: 3rem;
      font-size: 0.65rem;
      font-weight: 600;
      color: #3a2b66;
      border: 1px solid #beabec;
      flex-shrink: 0;
    }

    .count-pill {
      background: #4e3980;
      color: white;
      padding: 0.2rem 0.9rem;
      border-radius: 40px;
    }

    .borrowed-section::-webkit-scrollbar {
      width: 4px;
    }
    .borrowed-section::-webkit-scrollbar-track {
      background: #e5dafe;
      border-radius: 10px;
    }
    .borrowed-section::-webkit-scrollbar-thumb {
      background: #9d84cf;
      border-radius: 10px;
    }

    @media (max-height: 700px) {
      .pill { font-size: 0.9rem; padding: 0.2rem 0.8rem; }
      .chip { font-size: 0.9rem; padding: 0.25rem 1rem; }
      .modal-name { font-size: 0.95rem; }
      .scale-note-badge { font-size: 0.65rem; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="app-header">
    <div class="app-title">
      <h1>🎶 Chords Library</h1>
      <span class="app-badge">songs & scales</span>
    </div>
    <div class="selector-row">
      <div class="selector-item">
        <label for="rootSelect">ROOT</label>
        <select id="rootSelect" class="styled-select"></select>
      </div>
      <div class="selector-item">
        <label for="scaleSelect">BASE THAAT</label>
        <select id="scaleSelect" class="styled-select">
          <option value="major">Major</option>
          <option value="minor">Minor</option>
        </select>
      </div>
    </div>
  </div>

  <div class="scale-card" id="mainScaleCard"></div>

  <div class="borrowed-section" id="borrowedSection">
    <div class="section-title" id="sectionTitle">🎸 Modes / Thaats unique chords &  example songs</div>
    <div class="modal-grid" id="modalGroupsContainer"></div>
  </div>

  <div class="app-footer">
    <span>🎵 For personal use ONLY</span>
    <span class="count-pill" id="outsideCount">0</span>
  </div>
</div>

<script>
  (function() {
    const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

    // patterns & qualities for diatonic base (Bilawal / Asawari)
    const majorPattern = [2,2,1,2,2,2,1];
    const minorPattern = [2,1,2,2,1,2,2];
    const majorQualities = ["maj","min","min","maj","maj","min","dim"];
    const minorQualities = ["min","dim","maj","min","min","maj","maj"];

    function getScaleNotes(root, pattern) {
      let idx = notes.indexOf(root);
      const scale = [root];
      for (let i = 0; i < pattern.length - 1; i++) {
        idx = (idx + pattern[i]) % 12;
        scale.push(notes[idx]);
      }
      return scale;
    }

    function getBaseChordSet(root, isMajor) {
      const pattern = isMajor ? majorPattern : minorPattern;
      const qualities = isMajor ? majorQualities : minorQualities;
      let idx = notes.indexOf(root);
      const chords = [];
      for (let i = 0; i < pattern.length; i++) {
        let note = notes[idx];
        let qual = qualities[i];
        let symbol = qual === 'maj' ? '' : (qual === 'min' ? 'm' : '°');
        chords.push(note + symbol);
        idx = (idx + pattern[i]) % 12;
      }
      return new Set(chords);
    }

    // ----- THAAT DEFINITIONS with extended info: scale steps, song examples -----
    // For Major context (compared to Bilawal)
    const majorThaatDefinitions = [
      { 
        name: "Khamaj (Mixolydian)", desc: "♭7",
        pattern: [2,2,1,2,2,1,2],
        qualities: ["maj","min","min","maj","min","min","maj"],
        songRef: "Mukti dilaye yasu naam",
        songDetail: "Mixolydian vibe, flat 7 gives bluesy lift"
      },
      { 
        name: "Kalyan (Lydian)", desc: "♯4",
        pattern: [2,2,2,1,2,2,1],
        qualities: ["maj","maj","min","dim","maj","min","min"],
        songRef: "Gao sana tusi raab di",
        songDetail: "Dreamy #4 brightness"
      },
      { 
        name: "Bhairav (Phrygian Dominant)", desc: "♭2 ♭6 ♭7 · exotic",
        pattern: [1,2,2,1,2,2,2],   // 1 b2 3 4 5 b6 b7
        qualities: ["maj","maj","maj","maj","maj","maj","maj"],
        songRef: "N/A",
        songDetail: "Middle Eastern tension, iconic"
      },
      { 
        name: "Poorvi", desc: "♭2 ♯4 ♭7 · mysterious",
        pattern: [1,2,2,2,1,2,2],
        qualities: ["maj","maj","maj","maj","maj","maj","maj"],
        songRef: "N/A",
        songDetail: "Deep serene mood"
      },
      { 
        name: "Marwa", desc: "♭2 · urgent, bright",
        pattern: [1,2,2,1,2,2,2],
        qualities: ["maj","maj","maj","maj","maj","maj","maj"],
        songRef: "N/A",
        songDetail: "No perfect fifth but powerful"
      }
    ];

    // Minor context (compared to Asawari)
    const minorThaatDefinitions = [
      { 
        name: "Kafi (Dorian)", desc: "♮6 · soulful",
        pattern: [2,1,2,2,2,1,2],
        qualities: ["min","min","maj","maj","min","dim","maj"],
        songRef: "Saryo loko sady raab nu",
        songDetail: "Minor with major 6th, jazzy"
      },
      { 
        name: "Bhairavi (Phrygian)", desc: "♭2 · dark & flamenco",
        pattern: [1,2,2,2,1,2,2],
        qualities: ["min","maj","maj","min","min","maj","maj"],
        songRef: "Khudaya teri rooh to main bhala",
        songDetail: "Exotic flat 2, intense"
      },
      { 
        name: "Todi", desc: "♭2 ♯4 · meditative",
        pattern: [1,2,2,1,2,2,2],
        qualities: ["min","maj","maj","maj","maj","dim","dim"],
        songRef: "N/A",
        songDetail: "Deep pathos, complex scale"
      },
      
    ];

    // Helper: get scale notes array from pattern & root
    function getScaleNotesFromPattern(root, pattern) {
      let idx = notes.indexOf(root);
      const scaleList = [root];
      for (let i = 0; i < pattern.length - 1; i++) {
        idx = (idx + pattern[i]) % 12;
        scaleList.push(notes[idx]);
      }
      return scaleList;
    }

    // Generate unique chords for a thaat, also return the scale notes (for display)
    function getUniqueChordsAndScale(root, pattern, qualities, baseSet) {
      let idx = notes.indexOf(root);
      const chords = [];
      const scaleList = [];
      for (let i = 0; i < pattern.length; i++) {
        let note = notes[idx];
        scaleList.push(note);
        let qual = qualities[i];
        let symbol = qual === 'maj' ? '' : (qual === 'min' ? 'm' : '°');
        let chord = note + symbol;
        if (!baseSet.has(chord)) {
          chords.push(chord);
        }
        idx = (idx + pattern[i]) % 12;
      }
      return { uniqueChords: chords, scaleNotes: scaleList };
    }

    // Render main diatonic scale (Bilawal or Asawari) with roman numerals
    function renderMainScale(root, isMajor) {
      const pattern = isMajor ? majorPattern : minorPattern;
      const qualities = isMajor ? majorQualities : minorQualities;
      const scaleNotes = getScaleNotes(root, pattern);
      const roman = isMajor 
        ? ["I","ii","iii","IV","V","vi","vii°"] 
        : ["i","ii°","III","iv","v","VI","VII"];

      let pillsHtml = '';
      scaleNotes.forEach((note, i) => {
        let qual = qualities[i];
        let symbol = qual === 'maj' ? '' : (qual === 'min' ? 'm' : '°');
        pillsHtml += `<div class="pill">${note}${symbol}<small>${roman[i]}</small></div>`;
      });

      const scaleName = isMajor ? `Bilawal (Ionian)` : `Asawari (Aeolian)`;
      document.getElementById('mainScaleCard').innerHTML = `
        <div class="scale-header">
          <span>🎼 ${root} ${scaleName}</span>
          <span>diatonic · parent scale</span>
        </div>
        <div class="diatonic-pills">${pillsHtml}</div>
      `;
    }

    // render all thaats/modes with scale notes + songs + unique chords
    function renderModalGroups(root, isMajor) {
      const baseSet = getBaseChordSet(root, isMajor);
      const thaats = isMajor ? majorThaatDefinitions : minorThaatDefinitions;
      const titlePrefix = isMajor ? "⚡ Modes / Thaats (vs Bilawal)" : "⚡ Modes / Thaats (vs Asawari)";
      document.getElementById('sectionTitle').innerHTML = `🎸 ${titlePrefix} · scale + songs`;

      let allUniqueSet = new Set();
      let groupsHtml = '';

      thaats.forEach(thaat => {
        const { uniqueChords, scaleNotes } = getUniqueChordsAndScale(root, thaat.pattern, thaat.qualities, baseSet);
        uniqueChords.forEach(ch => allUniqueSet.add(ch));
        
        // build scale chips display
        let scaleChipsHtml = '';
        scaleNotes.forEach(note => {
          scaleChipsHtml += `<span class="scale-note-badge">${note}</span>`;
        });

        // chord chips for unique (only if exists)
        let chipsHtml = '';
        if (uniqueChords.length > 0) {
          uniqueChords.forEach(ch => chipsHtml += `<span class="chip">${ch}</span>`);
        } else {
          chipsHtml = `<span style="font-size:0.7rem; color:#6f5b9e;">✨ all chords match parent (no borrowings)</span>`;
        }

        // song reference section
        const songText = thaat.songRef || "traditional / classical reference";
        const songDetail = thaat.songDetail || "evocative mood in this scale";

        groupsHtml += `
          <div class="modal-card">
            <div class="modal-header">
              <span class="modal-name">${thaat.name}</span>
              <span class="modal-desc">${thaat.desc}</span>
            </div>
            <div class="scale-notes-row">
              ${scaleChipsHtml}
            </div>
            <div class="chord-chips">
              ${chipsHtml}
            </div>
            <div class="song-example">
              <span class="song-icon">🎧</span>
              <div>
                <span class="song-text">${songText}</span>
                <span class="song-artist"> — ${songDetail}</span>
              </div>
            </div>
          </div>
        `;
      });

      document.getElementById('modalGroupsContainer').innerHTML = groupsHtml;
      document.getElementById('outsideCount').innerText = allUniqueSet.size;
    }

    // full UI update
    function refreshAll() {
      const root = document.getElementById('rootSelect').value;
      const scaleType = document.getElementById('scaleSelect').value; // "major" or "minor"
      const isMajor = (scaleType === 'major');
      renderMainScale(root, isMajor);
      renderModalGroups(root, isMajor);
    }

    // populate root selector
    const rootSelect = document.getElementById('rootSelect');
    notes.forEach(n => {
      const opt = document.createElement('option');
      opt.value = n;
      opt.textContent = n;
      if (n === 'C') opt.selected = true;
      rootSelect.appendChild(opt);
    });

    rootSelect.addEventListener('change', refreshAll);
    document.getElementById('scaleSelect').addEventListener('change', refreshAll);
    refreshAll();
  })();
</script>
</body>
</html>
