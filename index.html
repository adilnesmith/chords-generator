<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Chords library</title>
  <style>
    /* ------------------------------------------------
     * Mobile-first – same clean design
     * ------------------------------------------------ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #12101c;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 6px;
    }

    .app-container {
      width: 100%;
      max-width: 500px;
      height: 98vh;
      background: #f8f2ff;
      border-radius: 2.2rem;
      padding: 1rem 0.8rem;
      box-shadow: 0 20px 40px #0000004d;
      border: 2px solid #b7a0de;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      color: #1d1433;
    }

    .app-header {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 0.8rem;
    }

    .app-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .app-title h1 {
      font-size: 1.7rem;
      font-weight: 700;
      background: linear-gradient(145deg, #382d5a, #6d4ec7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }

    .app-badge {
      background: #4f3c7c;
      color: white;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .selector-row {
      display: flex;
      gap: 0.5rem;
      background: #e7dcfe;
      border-radius: 3rem;
      padding: 0.5rem 0.6rem;
      border: 2px solid #b299e6;
    }

    .selector-item {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .selector-item label {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      color: #3b2b60;
      margin-left: 0.5rem;
      margin-bottom: 0.1rem;
    }

    .styled-select {
      background: white;
      border: 2px solid #a185d3;
      border-radius: 2.5rem;
      padding: 0.7rem 0.5rem;
      font-size: 1.1rem;
      font-weight: 700;
      color: #1d113b;
      appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="%233d2e5f" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>');
      background-repeat: no-repeat;
      background-position: right 0.8rem center;
      background-size: 1.2rem;
      cursor: pointer;
      text-align: center;
    }

    .scale-card {
      background: #e3d5ff;
      border-radius: 2rem;
      padding: 0.8rem 0.8rem;
      margin: 0.6rem 0 0.8rem 0;
      border: 2px solid #c6b0f0;
      box-shadow: 0 4px 12px #c2abea;
    }

    .scale-header {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.6rem;
      font-size: 1.1rem;
      font-weight: 700;
      color: #2d2150;
    }

    .scale-header span {
      background: #5d4690;
      color: white;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      font-size: 0.7rem;
      text-transform: uppercase;
    }

    .diatonic-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      justify-content: center;
    }

    .pill {
      background: white;
      border-radius: 2.5rem;
      padding: 0.4rem 1.2rem;
      font-weight: 700;
      font-size: 1.2rem;
      box-shadow: 0 2px 10px #b9a2e8;
      border: 2px solid #ffffff;
      color: #1c1238;
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
    }

    .pill small {
      font-size: 0.7rem;
      font-weight: 600;
      color: #5b4b84;
      margin-left: 0.2rem;
    }

    .borrowed-section {
      flex: 1;
      overflow-y: auto;
      padding: 0.2rem 0.2rem 0.2rem 0.2rem;
      min-height: 0;
      background: #f0e8ff;
      border-radius: 1.8rem;
      border: 2px solid #d1bef5;
      margin-top: 0.2rem;
    }

    .section-title {
      font-size: 1rem;
      font-weight: 700;
      color: #382b60;
      padding: 0.5rem 0.5rem 0.2rem 0.8rem;
    }

    .modal-grid {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      padding: 0.2rem 0.5rem 0.5rem 0.5rem;
    }

    .modal-card {
      background: #ffffffde;
      border-radius: 1.8rem;
      padding: 0.6rem 0.5rem;
      border: 2px solid #cfb9fc;
      box-shadow: 0 4px 10px #c2abec;
    }

    .modal-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      padding-left: 0.3rem;
      flex-wrap: wrap;
    }

    .modal-name {
      font-weight: 800;
      font-size: 1.1rem;
      color: #2d2352;
    }

    .modal-desc {
      background: #6f5ba3;
      color: white;
      padding: 0.1rem 1rem;
      border-radius: 40px;
      font-size: 0.6rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .chord-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
    }

    .chip {
      background: white;
      border-radius: 2.5rem;
      padding: 0.4rem 1.3rem;
      font-weight: 700;
      font-size: 1.2rem;
      color: #1c1238;
      border: 2px solid #ffffff;
      box-shadow: 0 2px 12px #ad94e0;
      transition: 0.05s;
      min-width: 4rem;
      text-align: center;
    }

    .chip:active {
      background: #dac9ff;
      transform: scale(0.96);
    }

    .app-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.5rem;
      background: #e2d4fc;
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      font-size: 0.7rem;
      color: #312758;
      font-weight: 600;
      border: 2px solid #b59de2;
    }

    .count-pill {
      background: #4d3a78;
      color: white;
      padding: 0.2rem 0.8rem;
      border-radius: 40px;
    }

    .borrowed-section::-webkit-scrollbar {
      width: 4px;
    }
    .borrowed-section::-webkit-scrollbar-thumb {
      background: #a28ad4;
      border-radius: 20px;
    }

    @media (max-height: 700px) {
      .pill { font-size: 1rem; padding: 0.2rem 1rem; }
      .chip { font-size: 1rem; padding: 0.2rem 1rem; }
      .modal-name { font-size: 1rem; }
    }
  </style>
</head>
<body>
<div class="app-container">

  <div class="app-header">
    <div class="app-title">
      <h1>🎸 Chords library</h1>
      <span class="app-badge">unique only</span>
    </div>

    <div class="selector-row">
      <div class="selector-item">
        <label for="rootSelect">root</label>
        <select id="rootSelect" class="styled-select"></select>
      </div>
      <div class="selector-item">
        <label for="scaleSelect">scale</label>
        <select id="scaleSelect" class="styled-select">
          <option value="major">Major</option>
          <option value="minor">Minor</option>
        </select>
      </div>
    </div>
  </div>

  <div class="scale-card" id="mainScaleCard"></div>

  <div class="borrowed-section" id="borrowedSection">
    <div class="section-title" id="sectionTitle">⚡ unique thaat chords</div>
    <div class="modal-grid" id="modalGroupsContainer"></div>
  </div>

  <div class="app-footer">
    <span>🎼 For personal use only</span>
    <span class="count-pill" id="outsideCount">0</span>
  </div>
</div>

<script>
  (function() {
    const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

    // Base scale patterns (Bilawal for major, Asawari for minor)
    const majorPattern = [2,2,1,2,2,2,1];
    const minorPattern = [2,1,2,2,1,2,2];
    const majorQualities = ["maj","min","min","maj","maj","min","dim"];
    const minorQualities = ["min","dim","maj","min","min","maj","maj"];

    function getScaleNotes(root, pattern) {
      let idx = notes.indexOf(root);
      const scale = [root];
      for (let i = 0; i < pattern.length - 1; i++) {
        idx = (idx + pattern[i]) % 12;
        scale.push(notes[idx]);
      }
      return scale;
    }

    // Get base diatonic chords (Bilawal or Asawari) as a Set
    function getBaseChordSet(root, isMajor) {
      const pattern = isMajor ? majorPattern : minorPattern;
      const qualities = isMajor ? majorQualities : minorQualities;
      let idx = notes.indexOf(root);
      const chords = [];
      for (let i = 0; i < pattern.length; i++) {
        let note = notes[idx];
        let qual = qualities[i];
        let symbol = qual === 'maj' ? '' : (qual === 'min' ? 'm' : '°');
        chords.push(note + symbol);
        idx = (idx + pattern[i]) % 12;
      }
      return new Set(chords);
    }

    const rootSelect = document.getElementById('rootSelect');
    notes.forEach(n => {
      const opt = document.createElement('option');
      opt.value = n;
      opt.textContent = n;
      if (n === 'C') opt.selected = true;
      rootSelect.appendChild(opt);
    });

    const scaleSelect = document.getElementById('scaleSelect');
    const mainScaleCard = document.getElementById('mainScaleCard');
    const borrowedSection = document.getElementById('borrowedSection');
    const modalGroupsContainer = document.getElementById('modalGroupsContainer');
    const outsideCountSpan = document.getElementById('outsideCount');
    const sectionTitle = document.getElementById('sectionTitle');

    let currentRoot = 'C';
    let currentScale = 'major';

    // render main diatonic (the reference scale)
    function renderMainScale() {
      const pattern = currentScale === 'major' ? majorPattern : minorPattern;
      const qualities = currentScale === 'major' ? majorQualities : minorQualities;
      const scaleNotes = getScaleNotes(currentRoot, pattern);
      const roman = currentScale === 'major' 
        ? ["I","ii","iii","IV","V","vi","vii°"] 
        : ["i","ii°","III","iv","v","VI","VII"];

      let pillsHtml = '';
      scaleNotes.forEach((note, i) => {
        let display = note;
        let qual = qualities[i];
        let symbol = qual === 'maj' ? '' : (qual === 'min' ? 'm' : '°');
        pillsHtml += `<div class="pill">${display}${symbol}<small>${roman[i]}</small></div>`;
      });

      mainScaleCard.innerHTML = `
        <div class="scale-header">
          <span>🎵 ${currentRoot} ${currentScale === 'major' ? 'Bilawal' : 'Asawari'}</span>
          <span>base thaat</span>
        </div>
        <div class="diatonic-pills">${pillsHtml}</div>
      `;
    }

    // ------------------------------------------------------------------
    // MAJOR thaats (complete patterns) – we'll filter against Bilawal set
    // ------------------------------------------------------------------
    const majorThaatDefinitions = [
      { 
        name: "Khamaj (Mixolydian)", 
        desc: "♭7",
        pattern: [2,2,1,2,2,1,2],  // Mixolydian steps
        qualities: ["maj","min","min","maj","min","min","maj"]  // I ii iii IV v vi ♭VII
      },
      { 
        name: "Kalyan (Lydian)", 
        desc: "♯4",
        pattern: [2,2,2,1,2,2,1],  // Lydian steps
        qualities: ["maj","maj","min","dim","maj","min","min"] // I II iii ♯iv° V vi vii
      },
      { 
        name: "Bhairav", 
        desc: "♭2 ♭6 ♭7",
        pattern: [1,2,2,1,2,2,2],  // Phrygian with natural 3? Bhairav that: 1 ♭2 3 4 5 ♭6 ♭7
        qualities: ["maj","maj","maj","maj","maj","maj","maj"] // all major for demonstration, but unique chords will appear
      },
      { 
        name: "Poorvi", 
        desc: "♭2 ♯4 ♭7",
        pattern: [1,2,2,2,1,2,2],
        qualities: ["maj","maj","maj","maj","maj","maj","maj"]
      },
      { 
        name: "Marwa", 
        desc: "♭2",
        pattern: [1,2,2,1,2,2,2],
        qualities: ["maj","maj","maj","maj","maj","maj","maj"]
      }
    ];

    // ------------------------------------------------------------------
    // MINOR thaats (complete patterns) – filter against Asawari set
    // ------------------------------------------------------------------
    const minorThaatDefinitions = [
      { 
        name: "Kafi (Dorian)", 
        desc: "♮6",
        pattern: [2,1,2,2,2,1,2],  // Dorian steps
        qualities: ["min","min","maj","maj","min","dim","maj"] // i ii ♭III IV v vi° ♭VII
      },
      { 
        name: "Bhairavi (Phrygian)", 
        desc: "♭2",
        pattern: [1,2,2,2,1,2,2],  // Phrygian steps
        qualities: ["min","maj","maj","min","min","maj","maj"] // i ♭II ♭III iv v ♭VI ♭vii
      },
      { 
        name: "Todi", 
        desc: "♭2 ♯4",
        pattern: [1,2,2,1,2,2,2],
        qualities: ["min","maj","maj","maj","maj","dim","dim"] // approximate
      },
      { 
        name: "Multani", 
        desc: "♭2 ♯4",
        pattern: [1,2,2,2,1,2,2],
        qualities: ["min","maj","maj","maj","maj","maj","maj"]
      },
      { 
        name: "Puriya Dhanashri", 
        desc: "♯4 ♭7",
        pattern: [2,2,2,1,2,2,1],
        qualities: ["maj","min","min","maj","maj","min","dim"]
      }
    ];

    // Generate chord chips for a given thaat, then filter against base set
    function generateUniqueChips(root, pattern, qualities, baseSet) {
      let idx = notes.indexOf(root);
      const chips = [];
      for (let i = 0; i < pattern.length; i++) {
        let note = notes[idx];
        let qual = qualities[i];
        let symbol = qual === 'maj' ? '' : (qual === 'min' ? 'm' : '°');
        let chord = note + symbol;
        // If chord is NOT in base set, it's unique (outsider)
        if (!baseSet.has(chord)) {
          chips.push(chord);
        }
        idx = (idx + pattern[i]) % 12;
      }
      return chips;
    }

    function renderModalGroups() {
      // Get base set (Bilawal or Asawari)
      const baseSet = getBaseChordSet(currentRoot, currentScale === 'major');

      // Choose thaat list (exclude base thaat itself – Bilawal/Asawari not shown)
      const thaats = currentScale === 'major' ? majorThaatDefinitions : minorThaatDefinitions;
      
      sectionTitle.innerText = currentScale === 'major' 
        ? '⚡ major thaats · unique vs Bilawal' 
        : '⚡ minor thaats · unique vs Asawari';

      borrowedSection.classList.remove('hidden-section');

      let allUniqueSet = new Set();
      let groupsHtml = '';

      thaats.forEach(thaat => {
        // Get unique chords for this thaat (not in base set)
        const uniqueChords = generateUniqueChips(currentRoot, thaat.pattern, thaat.qualities, baseSet);
        
        // Add to global set for footer count
        uniqueChords.forEach(ch => allUniqueSet.add(ch));

        // Only show card if there's at least one unique chord
        if (uniqueChords.length > 0) {
          let chipsHtml = '';
          uniqueChords.forEach(ch => chipsHtml += `<span class="chip">${ch}</span>`);

          groupsHtml += `
            <div class="modal-card">
              <div class="modal-header">
                <span class="modal-name">${thaat.name}</span>
                <span class="modal-desc">${thaat.desc}</span>
              </div>
              <div class="chord-chips">${chipsHtml}</div>
            </div>
          `;
        }
      });

      modalGroupsContainer.innerHTML = groupsHtml;
      outsideCountSpan.innerText = allUniqueSet.size;
    }

    function renderAll() {
      currentRoot = rootSelect.value;
      currentScale = scaleSelect.value;
      renderMainScale();
      renderModalGroups();
    }

    rootSelect.addEventListener('change', renderAll);
    scaleSelect.addEventListener('change', renderAll);

    renderAll();
  })();
</script>
</body>
</html>
