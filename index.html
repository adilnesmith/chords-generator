<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>live · clean outside chords (no modes)</title>
  <style>
    /* ultra minimal, one‑screen layout — just the extra chords you asked for */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #12101c;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 6px;
    }

    .live-panel {
      max-width: 1200px;
      width: 100%;
      background: #f8f4ff;
      border-radius: 2rem;
      padding: 1.2rem 1rem 1rem 1rem;
      box-shadow: 0 20px 40px #00000080;
      border: 1px solid #b398e0;
      height: 96vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      color: #1f1730;
    }

    /* top row: tiny */
    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.8rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(145deg, #312755, #6a4eb3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .selector-panel {
      display: flex;
      gap: 1.2rem;
      background: #e3d8fc;
      padding: 0.2rem 1.2rem 0.2rem 1.2rem;
      border-radius: 3rem;
      align-items: center;
      border: 1px solid #9d84ce;
    }

    .selector-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .selector-item label {
      font-weight: 700;
      font-size: 0.7rem;
      text-transform: uppercase;
      color: #392d58;
    }

    .styled-select {
      background: white;
      border: 2px solid #9d84ce;
      border-radius: 2rem;
      padding: 0.25rem 1.6rem 0.25rem 0.8rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: #1c1235;
      appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="%233d2e5f" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>');
      background-repeat: no-repeat;
      background-position: right 0.4rem center;
      background-size: 0.9rem;
      cursor: pointer;
    }

    /* main scale row – diatonic as small pills */
    .scale-row {
      background: #e9e0fe;
      border-radius: 2rem;
      padding: 0.6rem 1.2rem;
      margin-bottom: 1rem;
      border: 2px solid #cab3f0;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: space-between;
    }

    .scale-label {
      font-size: 1.2rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .scale-label span {
      background: #4b3680;
      color: white;
      padding: 0.1rem 1rem;
      border-radius: 40px;
      font-size: 0.7rem;
      text-transform: uppercase;
    }

    .chord-mini-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .chord-pill {
      background: white;
      border-radius: 2rem;
      padding: 0.2rem 1rem;
      font-weight: 700;
      font-size: 1rem;
      box-shadow: 0 2px 8px #bcaae2;
      border: 2px solid white;
    }

    .chord-pill small {
      font-size: 0.6rem;
      font-weight: 500;
      color: #624d91;
      margin-left: 4px;
    }

    /* ----- OUTSIDE CHORDS (clean grid, no mode groups) ----- */
    .outside-section {
      flex: 1;
      overflow-y: auto;
      padding: 0.8rem 0.2rem 0.2rem 0.2rem;
      min-height: 0;
    }

    .outside-header {
      font-size: 1rem;
      font-weight: 600;
      color: #3a2960;
      margin-bottom: 0.8rem;
      background: #d9cafc;
      display: inline-block;
      padding: 0.2rem 1.5rem;
      border-radius: 40px;
      border: 1px solid #9f86d3;
    }

    .outside-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(95px, 1fr));
      gap: 0.7rem;
    }

    .outside-chord {
      background: white;
      border-radius: 1.8rem;
      padding: 0.8rem 0.2rem;
      text-align: center;
      font-weight: 700;
      font-size: 1.2rem;
      color: #1a1035;
      border: 2px solid #ffffff;
      box-shadow: 0 4px 12px #bca5e8;
      transition: 0.05s;
      line-height: 1.2;
    }

    /* absolutely no small text, no mode labels */
    .outside-chord small {
      display: none;
    }

    .outside-chord:active {
      background: #d9c6ff;
    }

    /* footer stats – minimal */
    .footer-stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.6rem;
      font-size: 0.7rem;
      color: #392f58;
      background: #e0d1fc;
      padding: 0.2rem 1.2rem;
      border-radius: 40px;
    }

    .count-badge {
      background: #4b3679;
      color: white;
      padding: 0.1rem 0.8rem;
      border-radius: 40px;
    }

    /* scroll thin */
    .outside-section::-webkit-scrollbar {
      width: 5px;
    }
    .outside-section::-webkit-scrollbar-thumb {
      background: #a68ed2;
      border-radius: 20px;
    }
  </style>
</head>
<body>
<div class="live-panel">

  <!-- top controls -->
  <div class="top-row">
    <h1>♯ outside·chords</h1>
    <div class="selector-panel">
      <div class="selector-item">
        <label>root</label>
        <select id="rootSelect" class="styled-select"></select>
      </div>
      <div class="selector-item">
        <label>scale</label>
        <select id="scaleSelect" class="styled-select">
          <option value="major">major</option>
          <option value="minor">minor</option>
        </select>
      </div>
    </div>
  </div>

  <!-- main diatonic row (for reference) -->
  <div class="scale-row" id="mainScaleRow"></div>

  <!-- outside chords: exactly what you listed, transposed -->
  <div class="outside-section">
    <div class="outside-header">➕ outside the scale (C# · D · E · Fm · F# · Gm · G# · A#)</div>
    <div id="outsideGrid" class="outside-grid"></div>
  </div>

  <!-- footer with count -->
  <div class="footer-stats">
    <span>🎯 only specific borrowed chords · no mode clutter</span>
    <span id="outsideCount" class="count-badge">0</span>
  </div>
</div>

<script>
  (function() {
    // ----------------------------------------------
    // 12 notes
    const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

    // helper for flats (F, Bb, Eb etc)
    function prettifyNote(note, rootContext) {
      const flatMap = {"A#":"Bb","D#":"Eb","G#":"Ab","C#":"Db","F#":"Gb"};
      const flatRoots = ["F","Bb","Eb","Ab","Db","Gb"];
      if (flatRoots.includes(rootContext) && flatMap[note]) return flatMap[note];
      return note;
    }

    // intervals for ionian (major) and aeolian (minor)
    const majorPattern = [2,2,1,2,2,2,1];
    const minorPattern = [2,1,2,2,1,2,2]; // aeolian

    // chord qualities for major / minor (diatonic)
    const majorQualities = ["maj","min","min","maj","maj","min","dim"];
    const minorQualities = ["min","dim","maj","min","min","maj","maj"];

    function getScaleNotes(root, pattern) {
      let idx = notes.indexOf(root);
      const scale = [root];
      for (let i = 0; i < pattern.length - 1; i++) {
        idx = (idx + pattern[i]) % 12;
        scale.push(notes[idx]);
      }
      return scale; // 7 notes
    }

    // populate root dropdown
    const rootSelect = document.getElementById('rootSelect');
    notes.forEach(n => {
      const opt = document.createElement('option');
      opt.value = n;
      opt.textContent = n;
      if (n === 'C') opt.selected = true;
      rootSelect.appendChild(opt);
    });

    const scaleSelect = document.getElementById('scaleSelect');
    const mainScaleRow = document.getElementById('mainScaleRow');
    const outsideGrid = document.getElementById('outsideGrid');
    const outsideCount = document.getElementById('outsideCount');

    let currentRoot = 'C';
    let currentScale = 'major';

    // render main diatonic row (just as visual reference)
    function renderMainRow() {
      const pattern = currentScale === 'major' ? majorPattern : minorPattern;
      const qualities = currentScale === 'major' ? majorQualities : minorQualities;
      const scaleNotes = getScaleNotes(currentRoot, pattern);
      const roman = currentScale === 'major' 
        ? ["I","ii","iii","IV","V","vi","vii°"] 
        : ["i","ii°","III","iv","v","VI","VII"];

      let pills = '';
      scaleNotes.forEach((note, i) => {
        let display = prettifyNote(note, currentRoot);
        let qual = qualities[i];
        let symbol = qual === 'maj' ? '' : (qual === 'min' ? 'm' : '°');
        pills += `<div class="chord-pill">${display}${symbol}<small>${roman[i]}</small></div>`;
      });

      mainScaleRow.innerHTML = `
        <div class="scale-label">🎵 ${currentRoot} ${currentScale} <span>diatonic</span></div>
        <div class="chord-mini-grid">${pills}</div>
      `;
    }

    // get diatonic raw chord names (to exclude them from outside list)
    function getDiatonicSet() {
      const pattern = currentScale === 'major' ? majorPattern : minorPattern;
      const qualities = currentScale === 'major' ? majorQualities : minorQualities;
      const scaleNotes = getScaleNotes(currentRoot, pattern);
      const set = new Set();
      scaleNotes.forEach((note, i) => {
        let qual = qualities[i];
        let symbol = qual === 'maj' ? '' : (qual === 'min' ? 'm' : '°');
        set.add(note + symbol);   // e.g. "C", "Dm", "Em" etc
      });
      return set;
    }

    // ----------------------------------------------------
    // THE EXACT OUTSIDE CHORDS YOU REQUESTED (as raw intervals from root)
    // For C major: C#, D, E, Fm, F#, Gm, G#, A#
    // For A minor (example): same structure transposed
    // We'll define them as semitone offsets + quality
    // ----------------------------------------------------
    const outsideSpec = [
      { offset: 1, quality: 'maj' },    // #1 (C#)
      { offset: 2, quality: 'maj' },    // D
      { offset: 4, quality: 'maj' },    // E
      { offset: 5, quality: 'min' },    // F minor
      { offset: 6, quality: 'maj' },    // F#
      { offset: 7, quality: 'min' },    // G minor
      { offset: 8, quality: 'maj' },    // G#
      { offset: 10, quality: 'maj' }    // A# (or Bb)
    ];

    function renderOutsideChords() {
      const rootIdx = notes.indexOf(currentRoot);
      const diatonicSet = getDiatonicSet();

      // build the eight specific chords
      const chords = [];

      outsideSpec.forEach(spec => {
        let rawNoteIdx = (rootIdx + spec.offset) % 12;
        let rawNote = notes[rawNoteIdx];
        let symbol = spec.quality === 'maj' ? '' : 'm';
        let rawChord = rawNote + symbol;

        // ONLY show if it's NOT in the diatonic set (outside the scale)
        if (!diatonicSet.has(rawChord)) {
          // pretty display with possible flats
          let displayNote = prettifyNote(rawNote, currentRoot);
          let displayChord = displayNote + symbol;
          chords.push(displayChord);
        }
      });

      // sort chords by root index? but order as above is fine; we keep given order (C#, D, E, Fm, F#, Gm, G#, A#)
      // but after transposition we should maintain that relative order (based on offset)
      // they are already in increasing offset, so stable.

      // build grid
      let gridHtml = '';
      chords.forEach(ch => {
        gridHtml += `<div class="outside-chord">${ch}</div>`;
      });

      outsideGrid.innerHTML = gridHtml;
      outsideCount.innerText = chords.length;
    }

    function renderAll() {
      currentRoot = rootSelect.value;
      currentScale = scaleSelect.value;
      renderMainRow();
      renderOutsideChords();
    }

    rootSelect.addEventListener('change', renderAll);
    scaleSelect.addEventListener('change', renderAll);

    // initial render
    renderAll();
  })();
</script>
</body>
</html>
