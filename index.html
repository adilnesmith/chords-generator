<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">

<title>Thaat Chords & example songs</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="app-container">

<div class="app-header">

<div class="app-title">
<h1>🎶 Chords Library</h1>
<span class="app-badge">songs & scales</span>
</div>

<div class="selector-row">

<div class="selector-item">
<label for="rootSelect">ROOT</label>
<select id="rootSelect" class="styled-select"></select>
</div>

<div class="selector-item">
<label for="scaleSelect">BASE THAAT</label>
<select id="scaleSelect" class="styled-select">

<option value="major">Major</option>
<option value="minor">Minor</option>

</select>
</div>

</div>
</div>


<div class="scale-card" id="mainScaleCard"></div>


<div class="borrowed-section" id="borrowedSection">

<div class="section-title" id="sectionTitle">
🎸 Modes / Thaats unique chords & example songs
</div>

<div class="modal-grid" id="modalGroupsContainer"></div>

</div>


<div class="app-footer">

<span>🎵 For personal use ONLY</span>
<span class="count-pill" id="outsideCount">0</span>

</div>

</div>


<script src="script.js"></script>

</body>
</html>
